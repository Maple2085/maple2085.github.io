<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>帖子 & 文章 — Maple2085</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Maple2085 的帖子与文章列表" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" crossorigin="anonymous" />
  <link rel="stylesheet" href="https://cdn.imsyy.top/gh/imsyy/file/font/HarmonyOS_Sans/regular.min.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: "HarmonyOS Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      min-height: 100vh;
      background: url("./img/background.jpg") center/cover no-repeat fixed;
      padding: 40px 20px;
      color: #222;
    }

    /* ===== 顶部导航 ===== */
    .top-nav {
      max-width: 1100px;
      margin: 0 auto 32px;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .back-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 20px;
      background: rgba(255,255,255,0.3);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.4);
      border-radius: 50px;
      color: #333;
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      transition: all 0.3s;
    }

    .back-btn:hover {
      background: rgba(255,255,255,0.6);
      transform: translateX(-3px);
    }

    .page-title {
      font-size: 26px;
      font-weight: 700;
      color: #222;
      letter-spacing: -0.5px;
      text-shadow: 0 1px 8px rgba(255,255,255,0.5);
    }

    /* ===== 筛选标签 ===== */
    .filter-bar {
      max-width: 1100px;
      margin: 0 auto 28px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .filter-tag {
      padding: 7px 18px;
      border-radius: 50px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      border: 1px solid rgba(255,255,255,0.4);
      background: rgba(255,255,255,0.25);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      color: #444;
      transition: all 0.25s;
      user-select: none;
    }

    .filter-tag:hover {
      background: rgba(255,255,255,0.55);
    }

    .filter-tag.active {
      background: rgba(255, 126, 126, 0.85);
      color: #fff;
      border-color: rgba(255,126,126,0.6);
    }

    /* ===== 帖子网格 ===== */
    .posts-grid {
      max-width: 1100px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
    }

    /* ===== 帖子卡片 ===== */
    .post-card {
      background: rgba(255,255,255,0.28);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.45);
      box-shadow: 0 8px 32px rgba(0,0,0,0.12);
      overflow: hidden;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      transition: transform 0.3s ease, box-shadow 0.3s ease, opacity 0.3s ease;
      cursor: pointer;
    }

    .post-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 16px 40px rgba(0,0,0,0.18);
    }

    .post-card.hidden {
      display: none;
    }

    /* 封面图 */
    .post-cover {
      width: 100%;
      height: 180px;
      object-fit: cover;
      display: block;
      background: linear-gradient(135deg, rgba(255,200,200,0.4), rgba(200,200,255,0.4));
    }

    .post-cover-placeholder {
      width: 100%;
      height: 180px;
      background: linear-gradient(135deg, rgba(255,200,200,0.35), rgba(180,200,255,0.35));
      display: flex;
      align-items: center;
      justify-content: center;
      color: rgba(100,100,120,0.5);
      font-size: 36px;
    }

    /* 卡片内容 */
    .post-body {
      padding: 20px 22px 22px;
      display: flex;
      flex-direction: column;
      flex: 1;
      gap: 10px;
    }

    /* 标签行 */
    .post-tags {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .post-tag {
      font-size: 11px;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 50px;
      background: rgba(255,126,126,0.15);
      color: #c0504a;
      letter-spacing: 0.03em;
    }

    /* 标题 */
    .post-title {
      font-size: 17px;
      font-weight: 700;
      color: #1a1a1a;
      line-height: 1.4;
      letter-spacing: -0.3px;
    }

    /* 摘要 */
    .post-summary {
      font-size: 13px;
      color: #555;
      line-height: 1.7;
      flex: 1;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* 底部日期 + 箭头 */
    .post-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 4px;
    }

    .post-date {
      font-size: 12px;
      color: #888;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .post-arrow {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: rgba(255,255,255,0.6);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #555;
      font-size: 12px;
      transition: all 0.3s;
    }

    .post-card:hover .post-arrow {
      background: rgba(255,126,126,0.9);
      color: #fff;
      transform: translateX(3px);
    }

    /* ===== 空状态 ===== */
    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 60px 20px;
      color: rgba(80,80,100,0.6);
      font-size: 15px;
    }

    .empty-state i {
      font-size: 40px;
      margin-bottom: 12px;
      display: block;
      opacity: 0.4;
    }

    /* ===== 加载错误 ===== */
    .load-error {
      max-width: 1100px;
      margin: 0 auto;
      text-align: center;
      padding: 80px 20px;
      color: rgba(80,80,100,0.7);
    }

    /* ===== 入场动画 ===== */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .post-card {
      animation: fadeInUp 0.4s ease both;
    }

    /* ===== 响应式 ===== */
    @media (max-width: 700px) {
      .posts-grid { grid-template-columns: 1fr; }
      .page-title { font-size: 20px; }
    }
  </style>
</head>
<body>

  <!-- 顶部导航 -->
  <nav class="top-nav">
    <a href="index.html" class="back-btn">
      <i class="fa-solid fa-arrow-left"></i> 返回主页
    </a>
    <h1 class="page-title">帖子 & 文章</h1>
  </nav>

  <!-- 标签筛选栏（由 JS 动态生成） -->
  <div class="filter-bar" id="filterBar"></div>

  <!-- 帖子网格（由 JS 动态生成） -->
  <div class="posts-grid" id="postsGrid"></div>

  <script>
    let allPosts = [];
    let activeTag = '全部';

    // 加载 posts.json
    async function loadPosts() {
      const grid = document.getElementById('postsGrid');
      try {
        const res = await fetch('posts/posts.json');
        if (!res.ok) throw new Error('加载失败');
        allPosts = await res.json();
        buildFilterBar();
        renderPosts(allPosts);
      } catch (e) {
        grid.innerHTML = `
          <div class="load-error">
            <i class="fa-regular fa-folder-open" style="font-size:40px;opacity:0.4;display:block;margin-bottom:12px;"></i>
            <div>未能加载帖子列表</div>
            <div style="font-size:12px;margin-top:6px;opacity:0.6;">请确保 posts/posts.json 存在</div>
          </div>`;
      }
    }

    // 收集所有标签并生成筛选栏
    function buildFilterBar() {
      const bar = document.getElementById('filterBar');
      const tagSet = new Set();
      allPosts.forEach(p => (p.tags || []).forEach(t => tagSet.add(t)));
      const tags = ['全部', ...tagSet];
      bar.innerHTML = '';
      tags.forEach(tag => {
        const el = document.createElement('span');
        el.className = 'filter-tag' + (tag === '全部' ? ' active' : '');
        el.textContent = tag;
        el.addEventListener('click', () => {
          activeTag = tag;
          document.querySelectorAll('.filter-tag').forEach(t => t.classList.remove('active'));
          el.classList.add('active');
          filterPosts();
        });
        bar.appendChild(el);
      });
    }

    // 筛选帖子
    function filterPosts() {
      const filtered = activeTag === '全部'
        ? allPosts
        : allPosts.filter(p => (p.tags || []).includes(activeTag));
      renderPosts(filtered);
    }

    // 渲染帖子卡片
    function renderPosts(posts) {
      const grid = document.getElementById('postsGrid');
      grid.innerHTML = '';

      if (posts.length === 0) {
        grid.innerHTML = `
          <div class="empty-state">
            <i class="fa-regular fa-file"></i>
            该分类暂无帖子
          </div>`;
        return;
      }

      posts.forEach((post, i) => {
        const card = document.createElement('a');
        card.className = 'post-card';
        card.href = `posts/${post.id}.html`;
        card.style.animationDelay = `${i * 0.07}s`;

        const tagsHtml = (post.tags || [])
          .map(t => `<span class="post-tag">${t}</span>`)
          .join('');

        const coverHtml = post.cover
          ? `<img class="post-cover" src="posts/${post.cover}" alt="${post.title}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
             <div class="post-cover-placeholder" style="display:none"><i class="fa-regular fa-image"></i></div>`
          : `<div class="post-cover-placeholder"><i class="fa-regular fa-image"></i></div>`;

        const dateStr = post.date
          ? new Date(post.date).toLocaleDateString('zh-CN', { year: 'numeric', month: 'long', day: 'numeric' })
          : '';

        card.innerHTML = `
          ${coverHtml}
          <div class="post-body">
            <div class="post-tags">${tagsHtml}</div>
            <div class="post-title">${post.title}</div>
            <div class="post-summary">${post.summary || ''}</div>
            <div class="post-footer">
              <span class="post-date">
                <i class="fa-regular fa-calendar"></i> ${dateStr}
              </span>
              <span class="post-arrow">
                <i class="fa-solid fa-arrow-right"></i>
              </span>
            </div>
          </div>`;

        grid.appendChild(card);
      });
    }

    document.addEventListener('DOMContentLoaded', loadPosts);
  </script>

</body>
</html>
