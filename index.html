<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <title>Maple2085</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Maple2085 的个人主页 — 技术小白 · AI指令工具人" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    crossorigin="anonymous" />
  <link rel="stylesheet" href="https://cdn.imsyy.top/gh/imsyy/file/font/HarmonyOS_Sans/regular.min.css" />
  <style>
    :root {
      --cream: #f7f5f0;
      --blue-0: #e8f2ff;
      --blue-1: #c8deff;
      --blue-2: #93bcff;
      --blue-3: #5b9bff;
      --blue-4: #2563eb;
      --frost: rgba(245, 248, 255, 0.72);
      --border: rgba(180, 210, 255, 0.45);
      --text-1: #0f1623;
      --text-2: #3a4a6b;
      --text-3: #7a8fb5;
      --shadow-sm: 0 2px 12px rgba(50, 100, 200, 0.08);
      --shadow-md: 0 8px 40px rgba(50, 100, 200, 0.13);
      --shadow-lg: 0 24px 80px rgba(50, 100, 200, 0.20);
      --radius: 24px;
      --font-d: 'Syne', 'HarmonyOS Sans', sans-serif;
      --font-b: 'HarmonyOS Sans', -apple-system, sans-serif;
    }

    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box
    }

    html {
      scroll-behavior: smooth
    }

    body {
      font-family: var(--font-b);
      background: var(--cream);
      color: var(--text-1);
      min-height: 100vh;
      overflow-x: hidden;
      cursor: none
    }

    /* ── Cursor ── */
    #cur {
      position: fixed;
      width: 10px;
      height: 10px;
      background: var(--blue-4);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
      transition: width .2s, height .2s, background .2s;
      mix-blend-mode: multiply
    }

    #cur-r {
      position: fixed;
      width: 34px;
      height: 34px;
      border: 1.5px solid rgba(37, 99, 235, .35);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9998;
      transform: translate(-50%, -50%);
      transition: width .35s cubic-bezier(.23, 1, .32, 1), height .35s cubic-bezier(.23, 1, .32, 1)
    }

    body:has(.card:hover) #cur {
      width: 18px;
      height: 18px;
      background: var(--blue-3)
    }

    body:has(.card:hover) #cur-r {
      width: 52px;
      height: 52px;
      border-color: rgba(91, 155, 255, .45)
    }

    /* 桌面端彻底隐藏原生鼠标 */
    @media (hover: hover) and (pointer: fine) {

      *,
      *::before,
      *::after {
        cursor: none !important;
      }
    }

    /* 移动端关闭自定义鼠标 */
    @media (hover: none),
    (pointer: coarse) {

      #cur,
      #cur-r {
        display: none;
      }
    }

    /* ── Background ── */
    .bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      background: var(--cream);
      overflow: hidden
    }

    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(90px);
      opacity: .5;
      will-change: transform
    }

    .o1 {
      width: 720px;
      height: 720px;
      background: radial-gradient(circle, #bbd5ff 0%, transparent 70%);
      top: -200px;
      left: -150px;
      animation: o1 20s ease-in-out infinite alternate
    }

    .o2 {
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, #cde3ff 0%, transparent 70%);
      bottom: -120px;
      right: -100px;
      animation: o2 26s ease-in-out infinite alternate
    }

    .o3 {
      width: 420px;
      height: 420px;
      background: radial-gradient(circle, #deeeff 0%, transparent 70%);
      top: 40%;
      left: 50%;
      animation: o3 16s ease-in-out infinite alternate
    }

    .bg-grid {
      position: absolute;
      inset: 0;
      background-image: linear-gradient(rgba(140, 185, 255, .06) 1px, transparent 1px), linear-gradient(90deg, rgba(140, 185, 255, .06) 1px, transparent 1px);
      background-size: 64px 64px
    }

    @keyframes o1 {
      to {
        transform: translate(90px, 70px) scale(1.12)
      }
    }

    @keyframes o2 {
      to {
        transform: translate(-70px, -90px) scale(1.18)
      }
    }

    @keyframes o3 {
      to {
        transform: translate(-110px, 50px) scale(.88)
      }
    }

    /* ── Layout ── */
    .page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 64px 24px;
      gap: 36px
    }

    /* ── Entrance ── */
    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(28px);
        filter: blur(8px)
      }

      to {
        opacity: 1;
        transform: translateY(0);
        filter: blur(0)
      }
    }

    .a {
      opacity: 0;
      animation: fadeUp .75s cubic-bezier(.22, 1, .36, 1) forwards
    }

    .a1 {
      animation-delay: .05s
    }

    .a2 {
      animation-delay: .18s
    }

    .a3 {
      animation-delay: .32s
    }

    .a4 {
      animation-delay: .46s
    }

    .a5 {
      animation-delay: .60s
    }

    /* ── Hero ── */
    .hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 22px;
      text-align: center
    }

    /* Avatar */
    .av-wrap {
      position: relative;
      width: 126px;
      height: 126px
    }

    .av-ring {
      position: absolute;
      inset: -7px;
      border-radius: 50%;
      background: conic-gradient(var(--blue-3) 0deg, var(--blue-1) 90deg, #f0f4ff 180deg, var(--blue-2) 270deg, var(--blue-3) 360deg);
      animation: spin 5s linear infinite;
      filter: blur(1px)
    }

    .av-ring2 {
      position: absolute;
      inset: -4px;
      border-radius: 50%;
      background: var(--cream)
    }

    @keyframes spin {
      to {
        transform: rotate(360deg)
      }
    }

    .av-p1 {
      position: absolute;
      inset: -16px;
      border-radius: 50%;
      border: 1px solid rgba(91, 155, 255, .28);
      animation: pulse 3.2s ease-in-out infinite
    }

    .av-p2 {
      position: absolute;
      inset: -28px;
      border-radius: 50%;
      border: 1px solid rgba(91, 155, 255, .13);
      animation: pulse 3.2s ease-in-out infinite .55s
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
        transform: scale(1)
      }

      50% {
        opacity: .35;
        transform: scale(1.05)
      }
    }

    .av-img {
      position: relative;
      z-index: 1;
      width: 126px;
      height: 126px;
      border-radius: 50%;
      object-fit: cover;
      display: block
    }

    .av-fb {
      position: relative;
      z-index: 1;
      width: 126px;
      height: 126px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--blue-1), var(--blue-2));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 52px;
      color: white
    }

    /* Name */
    .name {
      font-family: var(--font-d);
      font-size: clamp(40px, 8vw, 72px);
      font-weight: 800;
      letter-spacing: -2.5px;
      line-height: 1;
      background: linear-gradient(140deg, var(--text-1) 20%, var(--blue-4) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text
    }

    /* Bio */
    .bio {
      font-size: 15px;
      color: var(--text-3);
      letter-spacing: .6px;
      display: flex;
      align-items: center;
      gap: 12px
    }

    .bio::before,
    .bio::after {
      content: '';
      display: block;
      width: 36px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--blue-2))
    }

    .bio::after {
      background: linear-gradient(90deg, var(--blue-2), transparent)
    }

    .blink {
      display: inline-block;
      width: 2px;
      height: 1em;
      background: var(--blue-3);
      margin-left: 2px;
      vertical-align: middle;
      animation: blink .9s step-end infinite
    }

    @keyframes blink {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: 0
      }
    }

    /* Social */
    .social {
      display: flex;
      gap: 12px
    }

    .sb {
      width: 46px;
      height: 46px;
      border-radius: 15px;
      background: var(--frost);
      backdrop-filter: blur(14px);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-2);
      font-size: 19px;
      text-decoration: none;
      box-shadow: var(--shadow-sm);
      transition: transform .35s cubic-bezier(.34, 1.56, .64, 1), background .3s, box-shadow .3s, color .3s
    }

    .sb:hover {
      transform: translateY(-7px) scale(1.1);
      background: white;
      box-shadow: var(--shadow-md);
      color: var(--blue-4)
    }

    /* ── Cards ── */
    .cards {
      display: flex;
      gap: 20px;
      width: 100%;
      max-width: 680px
    }

    .card {
      flex: 1;
      background: var(--frost);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow-md);
      padding: 34px 28px;
      text-decoration: none;
      color: var(--text-1);
      cursor: none;
      position: relative;
      overflow: hidden;
      transition: transform .45s cubic-bezier(.23, 1, .32, 1), box-shadow .45s, border-color .3s;
      transform-style: preserve-3d;
      will-change: transform
    }

    /* shine */
    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(500px circle at var(--mx, 50%) var(--my, 50%), rgba(140, 195, 255, .2), transparent 55%);
      opacity: 0;
      transition: opacity .3s;
      pointer-events: none;
      border-radius: inherit
    }

    .card:hover::before {
      opacity: 1
    }

    /* top line */
    .card::after {
      content: '';
      position: absolute;
      top: 0;
      left: 28px;
      right: 28px;
      height: 1.5px;
      background: linear-gradient(90deg, transparent, var(--blue-2), transparent);
      opacity: 0;
      transition: opacity .3s
    }

    .card:hover::after {
      opacity: 1
    }

    .card:hover {
      box-shadow: var(--shadow-lg);
      border-color: rgba(140, 195, 255, .65)
    }

    .card-icon {
      width: 54px;
      height: 54px;
      border-radius: 17px;
      background: linear-gradient(135deg, var(--blue-1), var(--blue-0));
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 23px;
      color: var(--blue-4);
      margin-bottom: 22px;
      transition: transform .4s cubic-bezier(.34, 1.56, .64, 1), box-shadow .3s;
      box-shadow: 0 4px 16px rgba(37, 99, 235, .12)
    }

    .card:hover .card-icon {
      transform: scale(1.14) rotate(-5deg);
      box-shadow: 0 8px 28px rgba(37, 99, 235, .22)
    }

    .card-label {
      font-size: 10.5px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--blue-3);
      margin-bottom: 7px
    }

    .card-title {
      font-family: var(--font-d);
      font-size: 27px;
      font-weight: 700;
      letter-spacing: -1px;
      line-height: 1.15;
      margin-bottom: 11px
    }

    .card-desc {
      font-size: 13px;
      color: var(--text-3);
      line-height: 1.7;
      margin-bottom: 26px
    }

    .card-cta {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      font-weight: 600;
      color: var(--blue-4);
      letter-spacing: .3px;
      transition: transform .4s cubic-bezier(.34, 1.56, .64, 1);
      transform-origin: left center
    }

    .card-cta i {
      font-size: 11px;
      transition: transform .3s cubic-bezier(.34, 1.56, .64, 1)
    }

    .card:hover .card-cta i {
      transform: translateX(6px)
    }

    .card:hover .card-cta {
      transform: scale(1.14)
    }

    /* Ripple */
    .rip {
      position: absolute;
      border-radius: 50%;
      background: rgba(91, 155, 255, .22);
      transform: scale(0);
      animation: rip .65s linear;
      pointer-events: none
    }

    @keyframes rip {
      to {
        transform: scale(4);
        opacity: 0
      }
    }

    /* ── Footer ── */
    .ft {
      font-size: 12px;
      color: var(--text-3);
      letter-spacing: .5px;
      opacity: .65
    }

    /* ── Responsive ── */
    @media(max-width:600px) {
      .cards {
        flex-direction: column;
        max-width: 100%
      }

      .card {
        padding: 28px 22px
      }

      .name {
        letter-spacing: -1.5px
      }
    }
  </style>
</head>

<body>
  <div id="cur"></div>
  <div id="cur-r"></div>

  <div class="bg">
    <div class="orb o1"></div>
    <div class="orb o2"></div>
    <div class="orb o3"></div>
    <div class="bg-grid"></div>
  </div>

  <div class="page">
    <section class="hero">
      <div class="av-wrap a a1">
        <div class="av-p2"></div>
        <div class="av-p1"></div>
        <div class="av-ring"></div>
        <div class="av-ring2"></div>
        <img class="av-img" src="./img/logo.jpg" alt="Maple2085 头像" loading="eager" decoding="async"
          onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
        <div class="av-fb" style="display:none"><i class="fa-solid fa-user"></i></div>
      </div>

      <h1 class="name a a2">Maple2085</h1>

      <p class="bio a a2">
        <span id="typed"></span><span class="blink"></span>
      </p>

      <div class="social a a3">
        <a href="https://github.com/Maple2085" target="_blank" rel="noopener noreferrer" class="sb" aria-label="GitHub">
          <i class="fa-brands fa-github"></i>
        </a>
        <a href="https://twitter.com/NLQFgzs" target="_blank" rel="noopener noreferrer" class="sb"
          aria-label="Twitter / X">
          <i class="fa-brands fa-x-twitter"></i>
        </a>
        <a href="https://b23.tv/vhu1ny9" target="_blank" rel="noopener noreferrer" class="sb" aria-label="Bilibili">
          <i class="fa-brands fa-bilibili"></i>
        </a>
      </div>
    </section>

    <div class="cards a a4">
      <a href="posts.html" class="card" aria-label="帖子与文章">
        <div class="card-icon"><i class="fa-regular fa-file-lines"></i></div>
        <div class="card-label">Blog</div>
        <div class="card-title">帖子 &amp;<br>文章</div>
        <div class="card-desc">教程、记录、折腾笔记，各种瞎搞的输出都在这。</div>
        <div class="card-cta">去看看 <i class="fa-solid fa-arrow-right"></i></div>
      </a>

      <a href="programs.html" class="card" aria-label="我的程序">
        <div class="card-icon"><i class="fa-solid fa-code"></i></div>
        <div class="card-label">Projects</div>
        <div class="card-title">我的<br>程序</div>
        <div class="card-desc">写过的工具和小玩意，开源为主，能用就行。</div>
        <div class="card-cta">查看项目 <i class="fa-solid fa-arrow-right"></i></div>
      </a>
    </div>

    <footer class="ft a a5">© 2026 Maple2085 · 技术小白 · AI指令工具人</footer>
  </div>

  <script>
    // ── Cursor ──
    const cur = document.getElementById('cur');
    const curR = document.getElementById('cur-r');
    let rx = 0, ry = 0, cx = 0, cy = 0;
    document.addEventListener('mousemove', e => {
      cx = e.clientX; cy = e.clientY;
      cur.style.left = cx + 'px'; cur.style.top = cy + 'px';
    });
    (function loop() {
      rx += (cx - rx) * .12; ry += (cy - ry) * .12;
      curR.style.left = rx + 'px'; curR.style.top = ry + 'px';
      requestAnimationFrame(loop);
    })();

    // ── Card 3D tilt + shine + ripple ──
    document.querySelectorAll('.card').forEach(card => {
      card.addEventListener('mousemove', e => {
        const r = card.getBoundingClientRect();
        const x = e.clientX - r.left, y = e.clientY - r.top;
        const cx = r.width / 2, cy = r.height / 2;
        card.style.transform = `perspective(900px) rotateX(${((y - cy) / cy) * -7}deg) rotateY(${((x - cx) / cx) * 7}deg) translateY(-5px)`;
        card.style.setProperty('--mx', (x / r.width * 100) + '%');
        card.style.setProperty('--my', (y / r.height * 100) + '%');
      });
      card.addEventListener('mouseleave', () => { card.style.transform = ''; });
      card.addEventListener('click', e => {
        const r = card.getBoundingClientRect();
        const rip = document.createElement('span');
        rip.className = 'rip';
        const s = Math.max(r.width, r.height);
        rip.style.cssText = `width:${s}px;height:${s}px;left:${e.clientX - r.left - s / 2}px;top:${e.clientY - r.top - s / 2}px`;
        card.appendChild(rip);
        setTimeout(() => rip.remove(), 700);
      });
    });

    // ── Background parallax ──
    document.addEventListener('mousemove', e => {
      const xp = (e.clientX / innerWidth - .5) * 28;
      const yp = (e.clientY / innerHeight - .5) * 28;
      document.querySelector('.o1').style.transform = `translate(${xp * .55}px,${yp * .55}px)`;
      document.querySelector('.o2').style.transform = `translate(${-xp * .38}px,${-yp * .38}px)`;
      document.querySelector('.o3').style.transform = `translate(${xp * .75}px,${yp * .75}px)`;
    });

    // ── Typewriter ──
    const txt = '技术小白 · AI指令工具人';
    const el = document.getElementById('typed');
    let i = 0;
    function type() {
      if (i <= txt.length) { el.textContent = txt.slice(0, i++); setTimeout(type, i === 1 ? 700 : 65); }
    }
    setTimeout(type, 550);
  </script>
</body>

</html>
