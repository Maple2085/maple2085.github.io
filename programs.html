<!DOCTYPE html>
<html lang="zh-CN" class="maple-theme">
<head>
  <meta charset="UTF-8" />
  <title>我的程序 — Maple2085</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" crossorigin="anonymous" />
  <link rel="stylesheet" href="https://cdn.imsyy.top/gh/imsyy/file/font/HarmonyOS_Sans/regular.min.css" />
  <style>
    :root{
      --cream:#f7f5f0;
      --blue-0:#e8f2ff;--blue-1:#c8deff;--blue-2:#93bcff;--blue-3:#5b9bff;--blue-4:#2563eb;
      --frost:rgba(245,248,255,.72);--frost2:rgba(255,255,255,.55);
      --border:rgba(180,210,255,.45);--border2:rgba(200,225,255,.28);
      --text-1:#0f1623;--text-2:#3a4a6b;--text-3:#7a8fb5;
      --shadow-sm:0 2px 12px rgba(50,100,200,.08);
      --shadow-md:0 8px 40px rgba(50,100,200,.13);
      --shadow-lg:0 24px 80px rgba(50,100,200,.20);
      --radius:24px;
      --font-d:'Syne','HarmonyOS Sans',sans-serif;
      --font-b:'HarmonyOS Sans',-apple-system,sans-serif;
    }
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    body{font-family:var(--font-b);background:var(--cream);color:var(--text-1);min-height:100vh;overflow-x:hidden;cursor:none}

    /* ── Cursor ── */
    #cur{position:fixed;width:10px;height:10px;background:var(--blue-4);border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);transition:width .2s,height .2s,background .2s;mix-blend-mode:multiply}
    #cur-r{position:fixed;width:34px;height:34px;border:1.5px solid rgba(37,99,235,.35);border-radius:50%;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:width .35s cubic-bezier(.23,1,.32,1),height .35s}

    /* ── BG ── */
    .bg{position:fixed;inset:0;z-index:0;background:var(--cream);overflow:hidden}
    .orb{position:absolute;border-radius:50%;filter:blur(90px);opacity:.48;will-change:transform}
    .o1{width:700px;height:700px;background:radial-gradient(circle,#b8d3ff 0%,transparent 70%);top:-180px;right:-100px;animation:o1 22s ease-in-out infinite alternate}
    .o2{width:550px;height:550px;background:radial-gradient(circle,#cce2ff 0%,transparent 70%);bottom:-100px;left:-80px;animation:o2 18s ease-in-out infinite alternate}
    .bg-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(140,185,255,.06) 1px,transparent 1px),linear-gradient(90deg,rgba(140,185,255,.06) 1px,transparent 1px);background-size:64px 64px}
    @keyframes o1{to{transform:translate(-60px,80px) scale(1.1)}}
    @keyframes o2{to{transform:translate(80px,-60px) scale(1.15)}}

    /* ── Page ── */
    .page{position:relative;z-index:1;max-width:980px;margin:0 auto;padding:52px 24px 80px}

    /* ── Entrance ── */
    @keyframes fadeUp{from{opacity:0;transform:translateY(24px);filter:blur(6px)}to{opacity:1;transform:translateY(0);filter:blur(0)}}
    .a{opacity:0;animation:fadeUp .7s cubic-bezier(.22,1,.36,1) forwards}
    .a1{animation-delay:.05s}.a2{animation-delay:.15s}.a3{animation-delay:.25s}
    .stagger{opacity:0}
    .stagger.visible{animation:fadeUp .65s cubic-bezier(.22,1,.36,1) forwards}

    /* ── Nav ── */
    .nav{display:flex;align-items:center;gap:16px;margin-bottom:56px}
    .back{display:flex;align-items:center;gap:8px;padding:11px 22px;background:var(--frost);backdrop-filter:blur(16px);border:1px solid var(--border);border-radius:50px;color:var(--text-2);text-decoration:none;font-size:14px;font-weight:500;box-shadow:var(--shadow-sm);transition:transform .3s cubic-bezier(.34,1.56,.64,1),background .3s,box-shadow .3s;cursor:none}
    .back:hover{transform:translateX(-5px);background:white;box-shadow:var(--shadow-md)}
    .back i{transition:transform .3s}
    .back:hover i{transform:translateX(-2px)}

    /* ── Header ── */
    .hdr{margin-bottom:52px}
    .hdr-eyebrow{font-size:11px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:var(--blue-3);margin-bottom:10px}
    .hdr-title{font-family:var(--font-d);font-size:clamp(36px,6vw,60px);font-weight:800;letter-spacing:-2px;line-height:1.05;background:linear-gradient(140deg,var(--text-1) 25%,var(--blue-4));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:14px}
    .hdr-sub{font-size:15px;color:var(--text-3);line-height:1.65;max-width:480px}

    /* ── Project Grid ── */
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(420px,1fr));gap:24px}

    /* ── Project Card ── */
    .proj{background:var(--frost);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow-md);overflow:hidden;position:relative;transition:transform .45s cubic-bezier(.23,1,.32,1),box-shadow .45s,border-color .3s;transform-style:preserve-3d;will-change:transform;cursor:none}
    .proj::before{content:'';position:absolute;inset:0;background:radial-gradient(450px circle at var(--mx,50%) var(--my,50%),rgba(140,195,255,.18),transparent 55%);opacity:0;transition:opacity .3s;pointer-events:none;border-radius:inherit;z-index:0}
    .proj:hover::before{opacity:1}
    .proj:hover{box-shadow:var(--shadow-lg);border-color:rgba(140,195,255,.65);transform:translateY(-5px)}

    /* Cover */
    .proj-cover{width:100%;height:210px;object-fit:cover;display:block;background:linear-gradient(135deg,var(--blue-0),var(--blue-1));position:relative;z-index:1;transition:transform .5s cubic-bezier(.23,1,.32,1)}
    .proj:hover .proj-cover{transform:scale(1.03)}
    .proj-cover-ph{width:100%;height:210px;background:linear-gradient(135deg,var(--blue-0) 0%,var(--blue-1) 50%,#d5e9ff 100%);display:flex;align-items:center;justify-content:center;font-size:52px;color:var(--blue-3);position:relative;overflow:hidden}
    .proj-cover-ph::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.3) 0%,transparent 60%)}

    /* Body */
    .proj-body{padding:26px 28px 28px;position:relative;z-index:1}

    .proj-num{position:absolute;top:22px;right:26px;font-family:var(--font-d);font-size:42px;font-weight:800;color:var(--blue-1);line-height:1;user-select:none;transition:color .3s}
    .proj:hover .proj-num{color:var(--blue-2)}

    .proj-title{font-family:var(--font-d);font-size:22px;font-weight:700;letter-spacing:-.5px;margin-bottom:10px;color:var(--text-1);padding-right:52px}
    .proj-desc{font-size:13.5px;color:var(--text-3);line-height:1.7;margin-bottom:22px}

    /* Links */
    .proj-links{display:flex;flex-wrap:wrap;gap:8px}
    .plink{display:inline-flex;align-items:center;gap:7px;padding:9px 16px;border-radius:12px;font-size:12.5px;font-weight:600;text-decoration:none;border:1px solid var(--border);background:var(--frost2);backdrop-filter:blur(8px);color:var(--text-2);transition:transform .3s cubic-bezier(.34,1.56,.64,1),background .25s,box-shadow .25s,color .25s,border-color .25s;cursor:none}
    .plink:hover{transform:translateY(-3px) scale(1.04);background:white;box-shadow:var(--shadow-md);color:var(--blue-4);border-color:rgba(91,155,255,.5)}
    .plink i{font-size:12px;transition:transform .3s}
    .plink:hover i{transform:scale(1.2)}
    .plink-primary{background:var(--blue-4);color:white;border-color:transparent}
    .plink-primary:hover{background:var(--blue-3);color:white;border-color:transparent}

    /* Ripple */
    .rip{position:absolute;border-radius:50%;background:rgba(91,155,255,.2);transform:scale(0);animation:rip .65s linear;pointer-events:none}
    @keyframes rip{to{transform:scale(4);opacity:0}}

    /* ── Responsive ── */
    @media(max-width:700px){
      .grid{grid-template-columns:1fr}
      .hdr-title{letter-spacing:-1px}
      .proj-body{padding:22px 20px 24px}
    }
  </style>
  <link rel="stylesheet" href="assets/maple-theme.css" />
</head>
<body>
  <div id="cur"></div>
  <div id="cur-r"></div>

  <div class="bg">
    <div class="orb o1"></div>
    <div class="orb o2"></div>
    <div class="bg-grid"></div>
  </div>

  <div class="page">

    <nav class="nav a a1">
      <a href="index.html" class="back" aria-label="返回主页">
        <i class="fa-solid fa-arrow-left"></i> 返回主页
      </a>
    </nav>

    <header class="hdr">
      <div class="hdr-eyebrow a a1">Projects</div>
      <h1 class="hdr-title a a2">我的程序</h1>
      <p class="hdr-sub a a3">写过的工具和小玩意，开源为主，能用就行。<br>点击链接直接体验或查看源码。</p>
    </header>

    <div class="grid" id="grid">

      <!-- 小米笔记 -->
      <article class="proj stagger" data-delay="0">
        <div class="proj-cover-ph">
          <i class="fa-solid fa-book-open"></i>
        </div>
        <div class="proj-body">
          <div class="proj-num">01</div>
          <h2 class="proj-title">小米笔记导出教程</h2>
          <p class="proj-desc">手把手教你把小米笔记的内容导出成通用格式，告别数据锁死，附视频教程和 Web 引导页，小白友好。</p>
          <div class="proj-links">
            <a href="https://maple2085.saop.cc/XiaomiNotes.html" target="_blank" rel="noopener noreferrer" class="plink plink-primary">
              <i class="fa-solid fa-terminal"></i> Web 版教程
            </a>
            <a href="https://www.bilibili.com/video/BV1hacMztEqy/" target="_blank" rel="noopener noreferrer" class="plink">
              <i class="fa-brands fa-bilibili"></i> 哔哩哔哩
            </a>
            <a href="https://maple2085.saop.cc/XiaomiNotes.md" target="_blank" rel="noopener noreferrer" class="plink">
              <i class="fa-solid fa-file-code"></i> 源码
            </a>
          </div>
        </div>
      </article>

      <!-- 文本分割 -->
      <article class="proj stagger" data-delay="120">
        <div class="proj-cover-ph">
          <i class="fa-solid fa-scissors"></i>
        </div>
        <div class="proj-body">
          <div class="proj-num">02</div>
          <h2 class="proj-title">文本分割工具</h2>
          <p class="proj-desc">把长文本按需切割成指定大小的片段，支持多种分割方式，纯前端运行，开源免费，双入口保障可用性。</p>
          <div class="proj-links">
            <a href="https://maple2085.github.io/txt-splitter/" target="_blank" rel="noopener noreferrer" class="plink plink-primary">
              <i class="fa-solid fa-rocket"></i> 立即使用
            </a>
            <a href="https://txt-splitter.vercel.app/" target="_blank" rel="noopener noreferrer" class="plink">
              <i class="fa-solid fa-globe"></i> 备用入口
            </a>
            <a href="https://github.com/Maple2085/txt-splitter" target="_blank" rel="noopener noreferrer" class="plink">
              <i class="fa-brands fa-github"></i> GitHub
            </a>
          </div>
        </div>
      </article>

    </div>
  </div>

  <script>
    // ── Cursor ──
    const cur=document.getElementById('cur'),curR=document.getElementById('cur-r');
    let rx=0,ry=0,cx=0,cy=0;
    document.addEventListener('mousemove',e=>{
      cx=e.clientX;cy=e.clientY;
      cur.style.left=cx+'px';cur.style.top=cy+'px';
    });
    (function loop(){rx+=(cx-rx)*.12;ry+=(cy-ry)*.12;curR.style.left=rx+'px';curR.style.top=ry+'px';requestAnimationFrame(loop)})();

    // ── 3D Tilt + Shine + Ripple ──
    document.querySelectorAll('.proj').forEach(card=>{
      card.addEventListener('mousemove',e=>{
        const r=card.getBoundingClientRect();
        const x=e.clientX-r.left,y=e.clientY-r.top;
        card.style.transform=`perspective(1000px) rotateX(${((y-r.height/2)/r.height)*-6}deg) rotateY(${((x-r.width/2)/r.width)*6}deg) translateY(-5px)`;
        card.style.setProperty('--mx',(x/r.width*100)+'%');
        card.style.setProperty('--my',(y/r.height*100)+'%');
      });
      card.addEventListener('mouseleave',()=>{ card.style.transform=''; });
      card.addEventListener('mousedown',e=>{
        const r=card.getBoundingClientRect();
        const rip=document.createElement('span');
        rip.className='rip';
        const s=Math.max(r.width,r.height);
        rip.style.cssText=`width:${s}px;height:${s}px;left:${e.clientX-r.left-s/2}px;top:${e.clientY-r.top-s/2}px;z-index:2`;
        card.appendChild(rip);
        setTimeout(()=>rip.remove(),700);
      });
    });

    // ── Background parallax ──
    document.addEventListener('mousemove',e=>{
      const xp=(e.clientX/innerWidth-.5)*24;
      const yp=(e.clientY/innerHeight-.5)*24;
      document.querySelector('.o1').style.transform=`translate(${-xp*.5}px,${yp*.5}px)`;
      document.querySelector('.o2').style.transform=`translate(${xp*.4}px,${-yp*.4}px)`;
    });

    // ── Scroll-triggered stagger ──
    const obs=new IntersectionObserver(entries=>{
      entries.forEach(en=>{
        if(en.isIntersecting){
          const delay=en.target.dataset.delay||0;
          setTimeout(()=>{ en.target.classList.add('visible'); },+delay);
          obs.unobserve(en.target);
        }
      });
    },{threshold:.12});
    document.querySelectorAll('.stagger').forEach(el=>obs.observe(el));
  </script>
  <script src="assets/maple-theme.js"></script>
</body>
</html>
